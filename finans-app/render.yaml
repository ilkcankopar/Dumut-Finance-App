services:
  - type: web
    name: finans-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finans-db
          property: connectionString

databases:
  - name: finans-db
    plan: free
